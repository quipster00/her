<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOR YOUR EYES ONLY</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body, html {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom, #fbc2eb 0%, #a6c1ee 100%);
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  
  .bg-overlay {
    position: absolute; width: 100%; height: 100%;
    background: url('20260430_090547.jpg') no-repeat center center;
    background-size: cover; opacity: 0.15; z-index: 0;
  }

  /* LOCK SCREEN SECTION */
  #lock-screen {
    position: relative; z-index: 10; text-align: center;
    width: 90%; max-width: 380px; display: flex; flex-direction: column; align-items: center;
  }
  .header-meta {
    font-size: 11px; font-weight: 700; letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.5); text-transform: uppercase; margin-bottom: 5px;
  }
  .main-title {
    font-size: 28px; font-weight: 700; color: #ffffff; margin: 0 0 10px 0;
  }
  .hint-text {
    font-size: 14px; color: rgba(255, 255, 255, 0.7); margin-bottom: 30px;
  }

  /* Heart Dial Pad Container */
  .heart-container {
    position: relative; width: 280px; height: 280px;
    background: #ff7eb3; display: flex; flex-direction: column;
    justify-content: center; align-items: center; box-shadow: 0 15px 35px rgba(220, 100, 150, 0.4);
    border-radius: 50% 50% 0 0; transform: rotate(-45deg); margin-bottom: 40px;
  }
  .heart-container::before {
    content: ''; position: absolute; width: 280px; height: 280px;
    background: #ff7eb3; border-radius: 50%; top: 0; left: 140px;
  }
  .heart-content-wrapper {
    transform: rotate(45deg); display: flex; flex-direction: column;
    align-items: center; z-index: 5; margin-top: 40px; margin-left: 40px;
  }
  
  .lock-shackle {
    position: absolute; top: -45px; left: 37px; width: 130px; height: 100px;
    border: 12px solid rgba(255, 255, 255, 0.4); border-bottom: none;
    border-radius: 100px 100px 0 0; z-index: 1; transform: rotate(45deg);
  }

  /* Dial Selectors Layout - Updated for 6 slots */
  .dial-pad {
    display: flex; gap: 4px; margin-bottom: 15px;
  }
  .dial-column {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255, 255, 255, 0.9); padding: 4px 2px; border-radius: 12px;
  }
  .dial-btn {
    width: 24px; height: 20px; background: rgba(0, 0, 0, 0.05); border: none;
    border-radius: 6px; font-size: 14px; font-weight: 700; color: #444;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .dial-btn:active { background: rgba(0, 0, 0, 0.12); }
  .dial-value {
    font-size: 20px; font-weight: 700; color: #222222; margin: 8px 0; width: 28px; text-align: center;
  }
  .enter-btn {
    width: 130px; padding: 12px; border: none; border-radius: 25px;
    background: #111111; color: #ffffff; font-size: 14px; font-weight: 700;
    letter-spacing: 2px; cursor: pointer; transition: background 0.2s;
  }
  .enter-btn:hover { background: #222222; }

  /* ENVELOPE SECTION */
  #envelope-container {
    display: none; position: relative; z-index: 10;
    width: 90%; max-width: 400px; height: 260px;
    background: rgba(255, 255, 255, 0.85); border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.5);
    cursor: pointer; transition: transform 0.5s ease;
  }
  .envelope-seal {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 45px; height: 45px; background: #9c27b0; border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .envelope-lines {
    position: absolute; bottom: 30px; left: 30px; right: 30px;
    height: 2px; background: rgba(0,0,0,0.1); box-shadow: 0 12px 0 rgba(0,0,0,0.1), 0 24px 0 rgba(0,0,0,0.1);
  }
  .envelope-stamp {
    position: absolute; top: 25px; right: 25px; width: 35px; height: 42px;
    background: rgba(230, 210, 230, 0.6); border-radius: 4px; border: 1px dashed rgba(0,0,0,0.15);
  }

  /* STATIONERY LETTER SECTION */
  #letter-screen {
    display: none; position: relative; z-index: 10;
    width: 92%; max-width: 430px; height: 85vh;
    background: #fdfaf2; border-radius: 14px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    border-left: 2px solid #ff9aa2; 
    background-image: linear-gradient(#e1dcd3 1px, transparent 1px);
    background-size: 100% 32px; display: flex; flex-direction: column;
    box-sizing: border-box; padding: 0; overflow: hidden; /* Photo fits full width, no body padding */
  }
  .letter-scrollable {
    flex: 1; overflow-y: auto; padding: 0 25px 80px 30px;
    box-sizing: border-box; scroll-behavior: smooth;
  }
  .letter-scrollable::-webkit-scrollbar { width: 4px; }
  .letter-scrollable::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.05); border-radius: 10px; }
  
  /* Photo scales up to fill the full width of the paper card */
  .img-container {
    width: 100%; text-align: center; margin-bottom: 25px; margin-top: -2px; /* Pulls photo up flush */
  }
  .portrait {
    width: 100%; max-width: 100%; height: auto; border-radius: 14px 14px 0 0; /* Matches top of card */
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
  }

  .top-metadata {
    display: flex; justify-content: space-between; align-items: center;
    height: 32px; margin-bottom: 32px; font-family: 'Inter', sans-serif;
  }
  .dear-title {
    font-size: 24px; font-weight: 500; color: #111111; font-style: italic;
  }
  .date-badge {
    font-size: 11px; font-weight: 600; color: #8c857b; letter-spacing: 1px;
  }
  .arabic-callout {
    font-size: 28px; text-align: left; margin-bottom: 16px;
    color: #222222; font-family: 'Times New Roman', serif; height: 32px; line-height: 32px;
  }
  .body-text {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px; line-height: 32px; color: #2c2a27;
    white-space: pre-line; text-align: left; margin-bottom: 40px;
  }
  .sign-off-block {
    text-align: right; font-family: 'Inter', sans-serif;
    font-size: 12px; color: #6d665a; font-weight: 600; line-height: 32px; margin-right: -10px;
  }
  .sign-off-name {
    font-size: 20px; font-weight: 700; color: #111111; letter-spacing: 1px; line-height: 32px;
  }
  
  /* Fixed Footer Button Layer */
  .footer-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 75px;
    background: linear-gradient(to top, #fdfaf2 70%, transparent);
    display: flex; justify-content: center; align-items: center; border-radius: 0 0 14px 14px;
  }
  .nav-btn {
    padding: 10px 32px; border: 1px solid rgba(0,0,0,0.15); border-radius: 20px;
    background: #ffffff; font-size: 12px; font-weight: 700; letter-spacing: 1px;
    color: #555; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .text-cursor {
    display: inline-block; width: 2px; height: 18px; background: #2c2a27;
    margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle;
  }
  @keyframes blink { 0%, 100% { opacity:0; } 50% { opacity:1; } }
</style>
</head>
<body>

  <div class="bg-overlay"></div>

  <audio id="audio-track" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div id="lock-screen">
    <div class="lock-shackle"></div>
    <div class="header-meta">Pin Locked Love Letter</div>
    <div class="main-title">For Your Eyes Only</div>
    <div class="hint-text" id="status-hint">Sound started. Enter the 6-digit pin.</div>
    
    <div class="heart-container">
      <div class="heart-content-wrapper">
        <div class="dial-pad">
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d1', 1)">+</button>
            <div class="dial-value" id="d1">0</div>
            <button class="dial-btn" onclick="changeDigit('d1', -1)">-</button>
          </div>
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d2', 1)">+</button>
            <div class="dial-value" id="d2">0</div>
            <button class="dial-btn" onclick="changeDigit('d2', -1)">-</button>
          </div>
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d3', 1)">+</button>
            <div class="dial-value" id="d3">0</div>
            <button class="dial-btn" onclick="changeDigit('d3', -1)">-</button>
          </div>
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d4', 1)">+</button>
            <div class="dial-value" id="d4">0</div>
            <button class="dial-btn" onclick="changeDigit('d4', -1)">-</button>
          </div>
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d5', 1)">+</button>
            <div class="dial-value" id="d5">0</div>
            <button class="dial-btn" onclick="changeDigit('d5', -1)">-</button>
          </div>
          <div class="dial-column">
            <button class="dial-btn" onclick="changeDigit('d6', 1)">+</button>
            <div class="dial-value" id="d6">0</div>
            <button class="dial-btn" onclick="changeDigit('d6', -1)">-</button>
          </div>
        </div>
        <button class="enter-btn" onclick="checkPin()">ENTER</button>
      </div>
    </div>
  </div>

  <div id="envelope-container" onclick="openEnvelope()">
    <div class="envelope-stamp"></div>
    <div class="envelope-lines"></div>
    <div class="envelope-seal"></div>
  </div>

  <div id="letter-screen">
    <div class="img-container">
      <img class="portrait" src="20260430_090547.jpg" alt="Portrait">
    </div>

    <div class="letter-scrollable" id="scroll-box">
      <div class="top-metadata">
        <div class="dear-title">Dear <span id="arabic-inline"></span></div>
        <div class="date-badge">1 MAY 2026</div>
      </div>
      
      <div class="arabic-callout" id="main-callout"></div>
      
      <div class="body-text"><span id="live-text"></span><span class="text-cursor" id="letter-cursor"></span></div>
      
      <div class="sign-off-block" id="sign-block" style="display:none;">
        Yours always,<br>
        <span class="sign-off-name">KALIL</span>
      </div>
    </div>
    
    <div class="footer-bar">
      <button class="nav-btn" id="action-btn" onclick="skipTyping()">SKIP</button>
    </div>
  </div>

  <script>
    // Audio trigger
    document.body.addEventListener('touchstart', function() {
      const track = document.getElementById('audio-track');
      if(track.paused && !unlocked) { track.play().then(() => track.pause()).catch(e => {}); }
    }, {once: true});

    let unlocked = false;
    function changeDigit(id, change) {
      let el = document.getElementById(id);
      let val = parseInt(el.innerText) + change;
      if(val > 9) val = 0;
      if(val < 0) val = 9;
      el.innerText = val;
    }

    function checkPin() {
      let code = document.getElementById('d1').innerText + 
                 document.getElementById('d2').innerText + 
                 document.getElementById('d3').innerText + 
                 document.getElementById('d4').innerText +
                 document.getElementById('d5').innerText +
                 document.getElementById('d6').innerText;
                 
      // UPDATED PIN: 221024
      if(code === '221024') {
        unlocked = true;
        document.getElementById('audio-track').play().catch(e => console.log("Audio pipeline loaded."));
        document.getElementById('status-hint').innerText = "Code accepted. Unlocking...";
        setTimeout(() => {
          document.getElementById('lock-screen').style.display = 'none';
          document.getElementById('envelope-container').style.display = 'block';
        }, 1000);
      } else {
        document.getElementById('status-hint').innerText = "Incorrect code. Try again.";
        setTimeout(() => { document.getElementById('status-hint').innerText = "Sound started. Enter the 6-digit pin."; }, 2000);
      }
    }

    function openEnvelope() {
      let env = document.getElementById('envelope-container');
      env.style.transform = "scale(0.9) translateY(-100px)";
      env.style.opacity = "0";
      setTimeout(() => {
        env.style.display = 'none';
        document.getElementById('letter-screen').style.display = 'flex';
        startTypingSequence();
      }, 400);
    }

    const titleText = "ربيتي";
    const subTitleText = "بيتي";
    const letterContent = `I once dreamed of living in another era, far from everything society made us need. But now, even paradise would feel empty without you in it. Bread and meat may feed my body, but it's your existence that feeds my soul. You are my heart in human form, ya ruhi.\n\nI LOVE YOU.`;

    let step = 0;
    let charIdx = 0;
    let timer = null;
    const box = document.getElementById('scroll-box');
    
    // TYPING SPEED: Lower number = FASTER. Set to 20ms for very fast, fluid typing.
    const typeSpeedBody = 20; 

    function startTypingSequence() {
      typeTitleInline();
    }

    function typeTitleInline() {
      if(charIdx < titleText.length) {
        document.getElementById('arabic-inline').innerHTML += titleText.charAt(charIdx);
        charIdx++;
        timer = setTimeout(typeTitleInline, 90);
      } else {
        charIdx = 0;
        step = 1;
        setTimeout(typeMainCallout, 350);
      }
    }

    function typeMainCallout() {
      if(charIdx < subTitleText.length) {
        document.getElementById('main-callout').innerHTML += subTitleText.charAt(charIdx);
        charIdx++;
        timer = setTimeout(typeMainCallout, 110);
      } else {
        charIdx = 0;
        step = 2;
        setTimeout(typeMainBody, 400);
      }
    }

    function typeMainBody() {
      if(charIdx < letterContent.length) {
        document.getElementById('live-text').innerHTML += letterContent.charAt(charIdx);
        charIdx++;
        box.scrollTop = box.scrollHeight;
        // Body types at the new fast speed setting
        timer = setTimeout(typeMainBody, typeSpeedBody);
      } else {
        finishLetterLayout();
      }
    }

    function finishLetterLayout() {
      document.getElementById('letter-cursor').style.display = 'none';
      document.getElementById('sign-block').style.display = 'block';
      document.getElementById('action-btn').innerText = "NEXT";
      document.getElementById('action-btn').setAttribute('onclick', 'location.reload()');
      box.scrollTop = box.scrollHeight;
    }

    function skipTyping() {
      clearTimeout(timer);
      document.getElementById('arabic-inline').innerHTML = titleText;
      document.getElementById('main-callout').innerHTML = subTitleText;
      document.getElementById('live-text').innerHTML = letterContent;
      finishLetterLayout();
    }
  </script>
</body>
</html>
