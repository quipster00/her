<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FOR YOUR EYES ONLY</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Cormorant Garamond', serif; 
               background: #e6e0d4; display: flex; justify-content: center; align-items: center; }

  /* FANCY LOCK SCREEN */
  #lock-screen { text-align: center; background: #fffdf9; padding: 40px; border-radius: 15px; 
                 box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid #d4c4a8; }
  .heart { width: 120px; height: 120px; background: #e63946; position: relative; 
           transform: rotate(-45deg); margin: 0 auto 30px; }
  .heart::before, .heart::after { content: ""; position: absolute; width: 120px; height: 120px; 
                                 background: #e63946; border-radius: 50%; top: -60px; left: 0; }
  .heart::after { left: 60px; top: 0; }
  .dial-pad { display: flex; gap: 8px; margin-bottom: 25px; }
  .dial-col { display: flex; flex-direction: column; align-items: center; font-size: 20px; font-weight: bold; }
  .btn { cursor: pointer; background: #4a443a; color: #fff; border: none; padding: 10px 25px; 
         border-radius: 20px; font-family: 'Cormorant Garamond'; font-size: 18px; }

  /* LETTER SCREEN */
  #letter-wrapper { display: none; width: 90%; max-width: 450px; height: 85vh; background: #fdfaf2; 
                    box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow-y: auto; }
  .letter-body { padding: 30px; font-size: 22px; line-height: 45px; color: #2c2a27; 
                 background-image: linear-gradient(#d1ccc0 1px, transparent 1px); 
                 background-size: 100% 45px; background-position: 0 32px; 
                 word-wrap: break-word; }
</style>
</head>
<body>

  <audio id="bg-music" src="music.mp3" loop></audio>

  <div id="lock-screen">
    <div class="heart"></div>
    <h1 style="color:#4a443a; margin-bottom: 20px; font-weight: 400;">FOR YOUR EYES ONLY</h1>
    <div class="dial-pad" id="pad">
      <script>for(let i=1; i<=6; i++) document.write(`<div class="dial-col"><button onclick="chg('d${i}',1)">+</button><div id="d${i}">0</div><button onclick="chg('d${i}',-1)">-</button></div>`);</script>
    </div>
    <button class="btn" onclick="verify()">Unlock</button>
  </div>

  <div id="letter-wrapper">
    <img src="20260430_090547.jpg" style="width:100%; height:auto;" alt="Portrait">
    <div class="letter-body">
      <div style="font-weight:bold; font-size:28px; margin-bottom:15px;">بيتي</div>
      <div id="typing-area"></div>
    </div>
  </div>

  <script>
    const fullText = `I have lost count of the times my pen has bled trying to express what I feel for you, only for it to fail me miserably. Maybe it’s because I keep chasing perfection in my words. I was looking for the right language, when I should have simply been looking at you. How foolish of me not to realize that as long as the subject is you, everything will sound right, everything will feel right… everything will be just right.\n\nYou have always longed to see the world through the eyes of a child. Through that gaze, the world softens, becomes gentler, kinder, simpler, unafraid of wonder. In that innocence, curiosity has no boundaries, imagination no ceiling, and beauty hides in plain sight. You’re sweet, kind, caring, honest, unable to feign your emotions. If someone wounds you, it’s written all over your face. In a world built with masks and performances, you remain real.\n\nYou want to trust again. You want to rest in another’s care, to stop being strong by default. You long for someone who cares enough to be as involved and invested in your life as you are. Someone to take the weight off your shoulders, even in the smallest ways. You want someone to choose for you, not to control you, but to show that they care enough to notice the food on your plate, the clothes on your body, the music in your ears, the tone of your voice. You want them to see the way your mood shifts with the smallest inconvenience, the way you sit when you’re comfortable versus when you’re not, the moments you almost speak but chooses not to, the difference between what you say and what you mean, the habits you repeat without realizing, the fury you keep hidden… You want someone who helps you decide, not because you’re helpless, but because they see you entirely.\n\nBut how can you trust people when all they do is give you reasons not to?\n\nSo, you built a world of your own, a world with no doors, no windows, and walls so high, one could reach the heavens if they had courage to climb them. You created a space where there is no room for you to need people. You become everything to yourself. In your solitude, people started to whisper behind your back. They say you’ve changed, grown cold and distant, others called you strong, and independent. But for you, it was never about strength, it was about protection.\n\nYou’ve lived within those walls for so long that now, when someone tries to get close, you can feel the walls tremble. It’s her, your inner child, trying to break free, to feel again, to love and to experience the world at her own pace. This unsettles you. So, you end up pushing them away before anything has a chance to matter too much. It’s a defense mechanism; the only way you know how to keep your inner child’s innocence safe.\n\nBut I’m not going anywhere, even if it takes a million years to dismantle what you’ve built, I will spend my whole existence removing more bricks than I did the day before. Not as a promise meant to impress you, but simply as a fact that does not change with time or distance. I will remain consistent in the way I show up. Not loud. Not desperate. Just present.\n\nWhen I go quiet, do not mistake it for a lack of love, nor for a lack of caring. Rather, it’s my way of fixing my life, tidying up old habits, and getting my mind in the right place. Because you deserve a version of me that is whole, disciplined, and at peace with itself.\n\nI LOVE YOU.\n\n-KHALIL`;

    function chg(id, d) { let el = document.getElementById(id); let v = parseInt(el.innerText)+d; el.innerText = (v>9)?0:(v<0)?9:v; }
    
    function verify() {
      let code = ""; for(let i=1; i<=6; i++) code += document.getElementById(`d${i}`).innerText;
      if(code === "221024") {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('letter-wrapper').style.display = 'block';
        document.getElementById('bg-music').play();
        type();
      } else { alert("Incorrect"); }
    }

    let i = 0;
    function type() {
      if(i < fullText.length) {
        document.getElementById('typing-area').innerText += fullText.charAt(i);
        i++;
        setTimeout(type, 10);
      }
    }
  </script>
</body>
</html>
